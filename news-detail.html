    document.addEventListener('DOMContentLoaded', function() {
      document.documentElement.classList.add('page-ready');

  <style>
    .detail-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 140px 80px 120px;
    }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 56px;
      transition: color 0.2s;
      text-decoration: none;
    }
    .detail-back:hover { color: var(--white); }
    .detail-back svg { transition: transform 0.2s; }
    .detail-back:hover svg { transform: translateX(-4px); }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .detail-date {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .detail-cat {
      font-family: var(--font-display);
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .detail-title {
      font-family: var(--font-mincho);
      font-size: clamp(1.45rem, 3.2vw, 2.05rem);
      font-weight: 600;
      color: var(--white);
      line-height: 1.6;
      letter-spacing: 0.03em;
      margin-bottom: 40px;
      padding-bottom: 32px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .detail-body {
      font-family: var(--font-mincho);
      font-size: 0.98rem;
      color: #dcdcdc;
      line-height: 2.05;
      font-weight: 400;
    }
    .detail-body p { margin: 0 0 1.4em; }
    .detail-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(232,130,10,0.4); word-break: break-all; }
    .detail-body a:hover { border-bottom-color: var(--accent); }
    /* 本文内の見出し（CMSで # / ## / ### を選択） */
    .nd-h1, .nd-h2, .nd-h3 {
      font-family: var(--font-mincho);
      color: var(--white);
      line-height: 1.5;
      margin: 1.8em 0 0.7em;
    }
    .nd-h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; }
    .nd-h2 { font-size: 1.25rem; font-weight: 600; letter-spacing: 0.02em; padding-left: 14px; border-left: 3px solid var(--accent); }
    .nd-h3 { font-size: 1.06rem; font-weight: 600; color: #e6e6e6; }
    .nd-h1:first-child, .nd-h2:first-child, .nd-h3:first-child { margin-top: 0; }

    .detail-media {
      margin-top: 36px;
    }

    .detail-media img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 2px;
    }
    .detail-media.is-portrait img,
    .detail-media.is-portrait video { max-width: 460px; margin-left: auto; margin-right: auto; }

    .detail-media video {
      width: 100%;
      height: auto;
      display: block;
      outline: none;
    }

    .detail-media iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
      display: block;
    }

    .detail-not-found {
      text-align: center;
      padding: 80px 0;
      color: var(--text-dim);
      font-family: var(--font-display);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    @media (max-width: 768px) {
      .detail-wrap { padding: 100px 24px 80px; }
    }
  </style>

  <script>
    (function() {
      const nav = document.getElementById('mobileNav');
      const openBtn = document.getElementById('hamburger');
      const closeBtn = document.getElementById('mobileNavClose');
      function openNav() { nav.classList.add('open'); document.body.classList.add('nav-open'); }
      function closeNav() {
        nav.classList.remove('open');
        document.body.classList.remove('nav-open');
      }
      window.addEventListener('beforeunload', () => document.body.classList.remove('nav-open'));
      document.body.classList.remove('nav-open');
      if (openBtn) openBtn.addEventListener('click', () => nav.classList.contains('open') ? closeNav() : openNav());
      if (closeBtn) closeBtn.addEventListener('click', closeNav);
      nav.querySelectorAll('a').forEach(a => a.addEventListener('click', closeNav));
      nav.addEventListener('click', e => { if (e.target === nav) closeNav(); });
    })();

    // 本文を見出し(#/##/###)・段落・リンクに変換
    function renderNewsBody(body) {
      const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const linkify = s => s.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
      const lines = String(body).replace(/\r/g,'').split('\n');
      let html = '', para = [];
      const flush = () => {
        if (para.length) { html += '<p>' + linkify(para.join('<br>')) + '</p>'; para = []; }
      };
      lines.forEach(line => {
        const m = line.match(/^(#{1,3})\s+(.*)$/);
        if (m) {
          flush();
          const lvl = m[1].length;
          html += `<div class="nd-h${lvl}">${linkify(esc(m[2]))}</div>`;
        } else if (line.trim() === '') {
          flush();
        } else {
          para.push(esc(line));
        }
      });
      flush();
      return html;
    }

    function normalizeNewsMedia(media) {
      if (Array.isArray(media)) return media;
      if (typeof media === 'string' && media) {
        if (/^[a-zA-Z0-9_-]{11}$/.test(media)) return [{ type:'youtube', id:media }];
        const ext = media.split('.').pop().toLowerCase();
        return [{ type: ['mp4','mov','webm'].includes(ext) ? 'video' : 'image', src: media }];
      }
      return [];
    }
    function mediaHTML(item) {
      const arr = normalizeNewsMedia(item.media);
      if (!arr.length) return '';
      const ori = item.orientation === 'portrait' ? ' is-portrait' : '';
      return arr.map(m => {
        if (m.type === 'youtube') {
          const id = m.id || m.src || '';
          return `<div class="detail-media"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div>`;
        }
        const src = m.src || '';
        const ext = String(src).split('.').pop().toLowerCase();
        if (m.type === 'video' || ['mp4','mov','webm'].includes(ext)) {
          return `<div class="detail-media${ori}"><video controls playsinline preload="metadata"><source src="${src}"></video></div>`;
        }
        return `<div class="detail-media${ori}"><img src="${src}" alt="${item.title}" loading="lazy"></div>`;
      }).join('');
    }

    const params = new URLSearchParams(window.location.search);
    const targetId = params.get('id');

    fetch('news.json')
      .then(r => r.json())
      .then(data => {
        const item = data.find(n => String(n.id) === String(targetId));
        const wrap = document.getElementById('detailWrap');

        if (!item) {
          wrap.innerHTML = `
            <a href="news.html" class="detail-back">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
              News 一覧へ
            </a>
            <div class="detail-not-found">記事が見つかりません</div>`;
          document.title = 'News | DeFilMe';
          return;
        }

        document.title = `${item.title} | DeFilMe`;

        wrap.innerHTML = `
          <a href="news.html" class="detail-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
            News 一覧へ
          </a>
          <div class="detail-meta">
            <span class="detail-date">${item.date.replace(/-/g,'.')}</span>
            <span class="detail-cat">${item.category}</span>
          </div>
          <h1 class="detail-title">${item.title}</h1>
          ${item.body ? `<div class="detail-body">${renderNewsBody(item.body)}</div>` : ''}
          ${mediaHTML(item)}
        `;
      })
      .catch(() => {
        document.getElementById('detailWrap').innerHTML = `
          <a href="news.html" class="detail-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
            News 一覧へ
          </a>
          <div class="detail-not-found">読み込みに失敗しました</div>`;
      });

    // Reveal on scroll
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(el => {
        if (el.isIntersecting) { el.target.classList.add('visible'); revealObserver.unobserve(el.target); }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

    const footerNameEl = document.querySelector('.footer-name-reveal');
    if (footerNameEl) {
      const footerObserver = new IntersectionObserver((entries) => {
        entries.forEach(el => {
          if (el.isIntersecting) { el.target.classList.add('in-view'); footerObserver.unobserve(el.target); }
        });
      }, { threshold: 0.2 });
      footerObserver.observe(footerNameEl);
    }
  </script>
