  <title>Works | DeFilMe</title>
  <meta name="color-scheme" content="dark">
  <script>document.documentElement.className += ' js-fade';</script>
  <style>
    /* htmlの黒背景は常に表示したまま、body(中身)だけフェードイン */
    html { background-color: #1e1e1e; }
    html.js-fade body { opacity: 0; }
    html.js-fade.page-ready body {
      opacity: 1;
      transition: opacity 0.4s cubic-bezier(0.4,0.4,0,1);
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.documentElement.classList.add('page-ready');
      // backdrop-filterはアニメ開始後(1s)に付与してレイヤー確保チラつきを防ぐ
      setTimeout(function() {
        var h = document.querySelector('header');
        if (h) h.classList.add('blur-ready');
      }, 1000);
    });
  </script>
  <link rel="stylesheet" href="style.css?v=20260613">
  <link rel="icon" type="image/svg+xml" href="f3-dark.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="f3-dark-180.png">
  <style>
    .works-header {
      padding: 140px 80px 60px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .works-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(5rem, 12vw, 9rem);
      letter-spacing: 0.04em;
      line-height: 0.9;
      color: var(--white);
      margin-bottom: 48px;
    }

    /* Filter */
    .filter-top {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .filter-btn {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 14px 28px;
      position: relative;
      transition: color 0.2s;
    }

    .filter-btn::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .filter-btn:hover { color: var(--white); }
    .filter-btn.active { color: var(--white); }
    .filter-btn.active::after { transform: scaleX(1); }

    .filter-sub {
      display: flex;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }

    .filter-sub.visible {
      max-height: 56px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .filter-sub-btn {
      font-family: var(--font-display);
      font-size: 0.66rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 14px 24px;
      position: relative;
      transition: color 0.2s;
    }

    .filter-sub-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 24px; right: 24px;
      height: 1px;
      background: var(--text-mid);
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .filter-sub-btn:hover { color: var(--text-light); }
    .filter-sub-btn.active { color: var(--white); }
    .filter-sub-btn.active::after { transform: scaleX(1); }

    /* Works Grid — 4カラム */
    .works-grid {
      padding: 48px 80px 120px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px 16px;
    }

    .work-item {
      display: block;
      text-decoration: none;
      cursor: pointer;
    }

    .work-item-thumb {
      position: relative;
      overflow: hidden;
      aspect-ratio: 16/10;
      background: #111;
    }

    .work-item-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease, filter 0.3s;
      filter: brightness(0.88);
    }

    .work-item:hover .work-item-thumb img {
      transform: scale(1.05);
      filter: brightness(1);
    }

    .work-item-info {
      padding: 12px 0 4px;
    }

    .work-item-cat {
      font-family: var(--font-display);
      font-size: 0.56rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .work-item-title {
      font-family: var(--font-noto);
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--text-light);
      line-height: 1.5;
    }

    @media (max-width: 1200px) {
      .works-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .works-header { padding: 80px 24px 48px; }
      .works-grid { padding: 32px 24px 80px; grid-template-columns: repeat(2, 1fr); gap: 16px 12px; }
      /* スマホ: フィルターメニューをスクロール対応に */
      .filter-top {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .filter-top::-webkit-scrollbar { display: none; }
      .filter-btn {
        padding: 14px 18px;
        white-space: nowrap;
        flex-shrink: 0;
        font-size: 0.66rem;
        letter-spacing: 0.12em;
      }
      .filter-sub {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        flex-wrap: nowrap;
      }
      .filter-sub::-webkit-scrollbar { display: none; }
      .filter-sub-btn {
        padding: 12px 16px;
        white-space: nowrap;
        flex-shrink: 0;
        font-size: 0.62rem;
      }
    }
    @media (max-width: 480px) {
      .works-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    (function() {
      const nav = document.getElementById('mobileNav');
      const openBtn = document.getElementById('hamburger');
      const closeBtn = document.getElementById('mobileNavClose');
      function openNav() {
        nav.classList.add('open');
        document.body.classList.add('nav-open');
      }
      function closeNav() {
        nav.classList.remove('open');
        document.body.classList.remove('nav-open');
      }
      if (openBtn) openBtn.addEventListener('click', () => {
        nav.classList.contains('open') ? closeNav() : openNav();
      });
      if (closeBtn) closeBtn.addEventListener('click', closeNav);
      nav.querySelectorAll('a').forEach(a => a.addEventListener('click', closeNav));
      nav.addEventListener('click', e => { if (e.target === nav) closeNav(); });
    })();
    // Header scroll
    const hdr = document.querySelector('header');
    window.addEventListener('scroll', () => {
      hdr.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    const subLabels = {
      'music-video': 'Music Video',
      'live-shoot': 'Live Shoot',
      'documentary': 'Documentary',
      'snap': 'Snap',
      'portrait': 'Portrait',
    };

    // works-data.jsからグリッドを生成
    function buildGrid(data) {
      const grid = document.getElementById('worksGrid');
      grid.innerHTML = data.map(work => `
        <a class="work-item" data-category="${work.category}" data-sub="${work.sub}"
           href="work-detail.html?id=${work.id}">
          <div class="work-item-thumb">
            <img src="${work.thumb}" alt="${work.title}" loading="lazy">
          </div>
          <div class="work-item-info">
            <p class="work-item-cat">${subLabels[work.sub] || work.sub}</p>
            <p class="work-item-title">${work.displayTitle || work.title}</p>
          </div>
        </a>
      `).join('');
    }

    buildGrid(WORKS_DATA);

    const topBtns = document.querySelectorAll('.filter-btn');
    const subPhoto = document.getElementById('sub-photography');
    const subVideo = document.getElementById('sub-videography');
    let currentCat = 'all', currentSub = 'all';

    function filterItems() {
      document.querySelectorAll('.work-item').forEach(item => {
        const cat = item.dataset.category, sub = item.dataset.sub;
        const show = currentCat === 'all' || (currentCat === cat && (currentSub === 'all' || currentSub === sub));
        item.style.display = show ? 'block' : 'none';
      });
    }

    topBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        topBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.filter;
        currentSub = 'all';
        subPhoto.classList.remove('visible');
        subVideo.classList.remove('visible');
        if (currentCat === 'photography') {
          subPhoto.classList.add('visible');
          subPhoto.querySelectorAll('.filter-sub-btn').forEach((b,i) => b.classList.toggle('active', i===0));
        } else if (currentCat === 'videography') {
          subVideo.classList.add('visible');
          subVideo.querySelectorAll('.filter-sub-btn').forEach((b,i) => b.classList.toggle('active', i===0));
        }
        filterItems();
      });
    });

    document.addEventListener('click', e => {
      const btn = e.target.closest('.filter-sub-btn');
      if (!btn) return;
      btn.closest('.filter-sub').querySelectorAll('.filter-sub-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSub = btn.dataset.sub;
      filterItems();
    });

    // Reveal on scroll
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(el => {
        if (el.isIntersecting) {
          el.target.classList.add('visible');
          revealObserver.unobserve(el.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

    // Footer HIBIKI TAKAI: スクロールで入ったときにブラーreveal
    const footerNameEl = document.querySelector('.footer-name-reveal');
    if (footerNameEl) {
      const footerObserver = new IntersectionObserver((entries) => {
        entries.forEach(el => {
          if (el.isIntersecting) {
            el.target.classList.add('in-view');
            footerObserver.unobserve(el.target);
          }
        });
      }, { threshold: 0.2 });
      footerObserver.observe(footerNameEl);
    }
  </script>
</body>
