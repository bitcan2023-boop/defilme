<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inquiries | DeFilMe Admin</title>
<style>
:root {
  --bg: #0f0f0f;
  --panel: #181818;
  --border: rgba(255,255,255,0.08);
  --accent: #e8820a;
  --white: #f0f0f0;
  --mid: #999;
  --dim: #555;
  --pending: #e8820a;
  --wip: #4a9eff;
  --done: #4caf82;
  --font: 'Poppins', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--white); font-family: var(--font), sans-serif; font-size: 13px; min-height: 100vh; }
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

/* Layout */
.layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
.sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 24px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.main { padding: 32px; overflow-y: auto; }

/* Sidebar */
.sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.sidebar-logo span { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mid); }
.sidebar-logo strong { display: block; font-size: 14px; font-weight: 600; color: var(--white); }
.sidebar-nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; font-size: 12px; font-weight: 400;
  letter-spacing: 0.05em; color: var(--mid);
  text-decoration: none; transition: all 0.15s;
  border-left: 2px solid transparent;
}
.sidebar-nav a:hover { color: var(--white); background: rgba(255,255,255,0.04); }
.sidebar-nav a.active { color: var(--white); border-left-color: var(--accent); background: rgba(232,130,10,0.06); }
.sidebar-section { padding: 20px 20px 8px; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--dim); }

/* Header */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.page-header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.04em; }
.page-header .badge { background: var(--accent); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 10px; }

/* Auth */
.auth-box { max-width: 400px; margin: 80px auto; background: var(--panel); border: 1px solid var(--border); padding: 36px; border-radius: 4px; }
.auth-box h2 { font-size: 14px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); margin-bottom: 24px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 12px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: var(--white); font-family: var(--font), sans-serif; font-size: 13px;
  border-radius: 3px; outline: none; transition: border-color 0.2s;
}
.field input:focus, .field textarea:focus { border-color: rgba(255,255,255,0.2); }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 20px; font-family: var(--font), sans-serif;
  font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
  text-transform: uppercase; cursor: pointer;
  border-radius: 3px; border: none; transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #d0720a; }
.btn-ghost { background: rgba(255,255,255,0.06); color: var(--mid); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--white); background: rgba(255,255,255,0.1); }
.btn-sm { padding: 5px 12px; font-size: 10px; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 4px; }
.stat-card .num { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.stat-card .label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mid); }
.stat-pending .num { color: var(--pending); }
.stat-wip .num { color: var(--wip); }
.stat-done .num { color: var(--done); }

/* Filter tabs */
.filter-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.filter-tab {
  padding: 10px 20px; font-size: 11px; font-weight: 400;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--mid); background: none; border: none;
  cursor: pointer; position: relative; transition: color 0.2s;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.filter-tab:hover { color: var(--white); }
.filter-tab.active { color: var(--white); border-bottom-color: var(--accent); }

/* Inquiry list */
.inquiry-list { display: flex; flex-direction: column; gap: 1px; }
.inquiry-item {
  background: var(--panel); border: 1px solid var(--border);
  padding: 20px 24px; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  border-radius: 3px;
}
.inquiry-item:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.14); }
.inquiry-item.expanded { border-color: rgba(255,255,255,0.16); }
.item-header { display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start; }
.item-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; flex-wrap: wrap; }
.item-name { font-weight: 500; font-size: 14px; color: var(--white); }
.item-email { font-size: 11px; color: var(--mid); }
.item-date { font-size: 10px; color: var(--dim); letter-spacing: 0.08em; }
.item-subject { font-size: 12px; color: var(--mid); margin-bottom: 4px; }
.item-preview { font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 600px; }
.item-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

/* Status badge */
.status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 12px; font-size: 10px;
  font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
}
.status-pending { background: rgba(232,130,10,0.15); color: var(--pending); }
.status-wip     { background: rgba(74,158,255,0.15); color: var(--wip); }
.status-done    { background: rgba(76,175,130,0.15); color: var(--done); }

/* Detail panel */
.inquiry-detail {
  display: none; margin-top: 16px;
  padding-top: 16px; border-top: 1px solid var(--border);
}
.inquiry-item.expanded .inquiry-detail { display: block; }
.detail-message {
  font-size: 13px; color: var(--mid); line-height: 1.8;
  white-space: pre-wrap; background: rgba(255,255,255,0.02);
  border: 1px solid var(--border); padding: 16px; border-radius: 3px;
  margin-bottom: 16px;
}
.detail-actions { display: flex; gap: 8px; align-items: center; }
.status-select {
  padding: 6px 12px; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); color: var(--white);
  font-family: var(--font), sans-serif; font-size: 11px;
  border-radius: 3px; cursor: pointer; letter-spacing: 0.05em;
}

/* Empty / Loading */
.empty-state { text-align: center; padding: 80px 0; color: var(--dim); }
.empty-state p { font-size: 13px; margin-top: 12px; }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 10px; color: var(--dim); }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--panel); border: 1px solid var(--border);
  padding: 12px 20px; border-radius: 4px; font-size: 12px;
  opacity: 0; transform: translateY(8px);
  transition: all 0.3s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok { border-left: 3px solid var(--done); }
.toast.err { border-left: 3px solid #e85454; }

/* New inquiry form */
.new-btn { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span>DeFilMe</span>
      <strong>Admin</strong>
    </div>
    <nav class="sidebar-nav">
      <p class="sidebar-section">Content</p>
      <a href="index.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Works
      </a>
      <a href="index.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        News
      </a>
      <p class="sidebar-section">Management</p>
      <a href="inquiries.html" class="active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        問い合わせ
      </a>
      <p class="sidebar-section">Site</p>
      <a href="../index.html" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        サイトを開く
      </a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main" id="mainContent">
    <!-- Auth screen -->
    <div id="authScreen">
      <div class="auth-box">
        <h2>認証</h2>
        <div class="field">
          <label>GitHub Personal Access Token (PAT)</label>
          <input type="password" id="patInput" placeholder="github_pat_..." autocomplete="off">
        </div>
        <button class="btn btn-primary" onclick="authenticate()">ログイン</button>
        <p style="margin-top:16px;font-size:11px;color:var(--dim);">PATはブラウザのlocalStorageに保存されます。共有端末ではご注意ください。</p>
      </div>
    </div>

    <!-- Inquiries screen -->
    <div id="inquiriesScreen" style="display:none;">
      <div class="page-header">
        <div>
          <h1>問い合わせ管理 <span class="badge" id="pendingBadge">0</span></h1>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="loadInquiries()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            更新
          </button>
          <button class="btn btn-primary btn-sm" onclick="showNewForm()">
            + 手動追加
          </button>
          <button class="btn btn-ghost btn-sm" onclick="logout()" style="color:var(--dim);">ログアウト</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card stat-pending">
          <div class="num" id="statPending">-</div>
          <div class="label">未対応</div>
        </div>
        <div class="stat-card stat-wip">
          <div class="num" id="statWip">-</div>
          <div class="label">対応中</div>
        </div>
        <div class="stat-card stat-done">
          <div class="num" id="statDone">-</div>
          <div class="label">対応済み</div>
        </div>
      </div>

      <!-- Filter -->
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">すべて</button>
        <button class="filter-tab" data-filter="pending" onclick="setFilter('pending',this)">未対応</button>
        <button class="filter-tab" data-filter="wip" onclick="setFilter('wip',this)">対応中</button>
        <button class="filter-tab" data-filter="done" onclick="setFilter('done',this)">対応済み</button>
      </div>

      <!-- List -->
      <div id="inquiryList" class="inquiry-list">
        <div class="loading"><div class="spinner"></div> 読み込み中...</div>
      </div>
    </div>

    <!-- New inquiry modal -->
    <div id="newFormScreen" style="display:none;">
      <div class="page-header">
        <h1>手動追加</h1>
        <button class="btn btn-ghost btn-sm" onclick="cancelNew()">← 戻る</button>
      </div>
      <div style="max-width:560px;">
        <div class="field"><label>お名前 *</label><input type="text" id="newName"></div>
        <div class="field"><label>メールアドレス *</label><input type="email" id="newEmail"></div>
        <div class="field"><label>件名</label><input type="text" id="newSubject"></div>
        <div class="field"><label>メッセージ *</label><textarea id="newMessage" rows="6"></textarea></div>
        <div class="field">
          <label>ステータス</label>
          <select id="newStatus">
            <option value="pending">未対応</option>
            <option value="wip">対応中</option>
            <option value="done">対応済み</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="addInquiry()">追加</button>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const OWNER = 'bitcan2023-boop';
const REPO  = 'defilme';
const PATH  = 'inquiries.json';

let PAT = '';
let allInquiries = [];
let currentFilter = 'all';

// ========== Auth ==========
function authenticate() {
  const pat = document.getElementById('patInput').value.trim();
  if (!pat) return showToast('PATを入力してください', 'err');
  PAT = pat;
  localStorage.setItem('defilme_admin_pat', pat);
  showInquiries();
}

function logout() {
  PAT = '';
  localStorage.removeItem('defilme_admin_pat');
  document.getElementById('authScreen').style.display = 'block';
  document.getElementById('inquiriesScreen').style.display = 'none';
}

function showInquiries() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('newFormScreen').style.display = 'none';
  document.getElementById('inquiriesScreen').style.display = 'block';
  loadInquiries();
}

// ========== GitHub API ==========
async function getHeaders() {
  return {
    'Authorization': 'token ' + PAT,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json'
  };
}

async function loadInquiries() {
  document.getElementById('inquiryList').innerHTML = '<div class="loading"><div class="spinner"></div> 読み込み中...</div>';
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, { headers: await getHeaders() });
    if (res.status === 404) {
      // ファイルなし → 空で初期化
      allInquiries = [];
    } else if (!res.ok) {
      const e = await res.json();
      showToast('読み込み失敗: ' + e.message, 'err');
      return;
    } else {
      const data = await res.json();
      allInquiries = JSON.parse(atob(data.content.replace(/\n/g,'')));
    }
    updateStats();
    renderList();
  } catch(e) {
    showToast('エラー: ' + e.message, 'err');
  }
}

async function saveInquiries(msg) {
  try {
    const headers = await getHeaders();
    // 現在のSHAを取得
    let sha = null;
    const getRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, { headers });
    if (getRes.ok) {
      const cur = await getRes.json();
      sha = cur.sha;
    }
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(allInquiries, null, 2))));
    const body = { message: msg || 'update: inquiries', content };
    if (sha) body.sha = sha;
    const putRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
      method: 'PUT', headers, body: JSON.stringify(body)
    });
    if (!putRes.ok) {
      const e = await putRes.json();
      showToast('保存失敗: ' + e.message, 'err');
      return false;
    }
    return true;
  } catch(e) {
    showToast('保存エラー: ' + e.message, 'err');
    return false;
  }
}

// ========== Render ==========
function updateStats() {
  const pending = allInquiries.filter(i => i.status === 'pending').length;
  const wip     = allInquiries.filter(i => i.status === 'wip').length;
  const done    = allInquiries.filter(i => i.status === 'done').length;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statWip').textContent     = wip;
  document.getElementById('statDone').textContent    = done;
  document.getElementById('pendingBadge').textContent = pending;
  document.getElementById('pendingBadge').style.display = pending > 0 ? '' : 'none';
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('inquiryList');
  const filtered = currentFilter === 'all'
    ? [...allInquiries]
    : allInquiries.filter(i => i.status === currentFilter);

  // 新しい順
  filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>問い合わせはありません</p></div>';
    return;
  }

  const statusLabel = { pending: '未対応', wip: '対応中', done: '対応済み' };
  const statusClass = { pending: 'status-pending', wip: 'status-wip', done: 'status-done' };

  list.innerHTML = filtered.map(item => {
    const d = new Date(item.date);
    const dateStr = d.toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit' }) + ' ' + d.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
    return `
    <div class="inquiry-item" id="item-${item.id}" onclick="toggleItem('${item.id}')">
      <div class="item-header">
        <div>
          <div class="item-meta">
            <span class="item-name">${escHtml(item.name)}</span>
            <span class="item-email">${escHtml(item.email)}</span>
            <span class="item-date">${dateStr}</span>
          </div>
          ${item.subject ? `<div class="item-subject">${escHtml(item.subject)}</div>` : ''}
          <div class="item-preview">${escHtml(item.message)}</div>
        </div>
        <div class="item-actions" onclick="event.stopPropagation()">
          <span class="status ${statusClass[item.status]}">${statusLabel[item.status]}</span>
        </div>
      </div>
      <div class="inquiry-detail">
        <div class="detail-message">${escHtml(item.message)}</div>
        <div class="detail-actions">
          <select class="status-select" onchange="changeStatus('${item.id}', this.value)">
            <option value="pending" ${item.status==='pending'?'selected':''}>未対応</option>
            <option value="wip"     ${item.status==='wip'    ?'selected':''}>対応中</option>
            <option value="done"    ${item.status==='done'   ?'selected':''}>対応済み</option>
          </select>
          <a href="mailto:${escHtml(item.email)}?subject=Re: ${encodeURIComponent(item.subject||'お問い合わせ')}" class="btn btn-ghost btn-sm" onclick="event.stopPropagation()">
            返信メールを開く
          </a>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteItem('${item.id}')" style="color:#e85454;">削除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleItem(id) {
  const el = document.getElementById('item-' + id);
  el.classList.toggle('expanded');
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== Actions ==========
async function changeStatus(id, status) {
  const item = allInquiries.find(i => i.id === id);
  if (!item) return;
  item.status = status;
  const ok = await saveInquiries('update: inquiry status ' + id);
  if (ok) {
    showToast('ステータスを更新しました', 'ok');
    updateStats();
    renderList();
  }
}

async function deleteItem(id) {
  if (!confirm('この問い合わせを削除しますか？')) return;
  allInquiries = allInquiries.filter(i => i.id !== id);
  const ok = await saveInquiries('update: delete inquiry ' + id);
  if (ok) {
    showToast('削除しました', 'ok');
    updateStats();
    renderList();
  }
}

// ========== New inquiry ==========
function showNewForm() {
  document.getElementById('inquiriesScreen').style.display = 'none';
  document.getElementById('newFormScreen').style.display = 'block';
}
function cancelNew() {
  document.getElementById('newFormScreen').style.display = 'none';
  document.getElementById('inquiriesScreen').style.display = 'block';
}

async function addInquiry() {
  const name    = document.getElementById('newName').value.trim();
  const email   = document.getElementById('newEmail').value.trim();
  const subject = document.getElementById('newSubject').value.trim();
  const message = document.getElementById('newMessage').value.trim();
  const status  = document.getElementById('newStatus').value;
  if (!name || !email || !message) return showToast('必須項目を入力してください', 'err');

  const entry = { id: Date.now().toString(), date: new Date().toISOString(), name, email, subject, message, status };
  allInquiries.unshift(entry);
  const ok = await saveInquiries('add: new inquiry from ' + name);
  if (ok) {
    showToast('追加しました', 'ok');
    cancelNew();
    updateStats();
    renderList();
  }
}

// ========== Toast ==========
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ========== Init ==========
