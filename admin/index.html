<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeFilMe CMS</title>
<link rel="icon" type="image/svg+xml" href="https://defilme.com/f3-dark.svg">
<link rel="apple-touch-icon" sizes="180x180" href="https://defilme.com/f3-dark-180.png">
<style>

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --accent: #e8820a;
    --accent-dim: rgba(232,130,10,0.12);
    --text: #e8e8e8;
    --text-muted: #666;
    --text-dim: #999;
    --danger: #e84a4a;
    --success: #4ae89a;
    --font: 'Poppins', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── FONTS ── */
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .login-box {
    width: 100%;
    max-width: 400px;
  }

  .login-logo {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text);
    margin-bottom: 8px;
  }

  .login-logo span { color: var(--accent); }

  .login-sub {
    color: var(--text-muted);
    font-size: 12px;
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }

  .field-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .field-group { margin-bottom: 20px; }

  input[type="text"], input[type="password"], input[type="date"],
  input[type="month"], textarea, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }

  textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
    justify-content: center;
    padding: 12px;
  }

  .btn-primary:hover:not(:disabled) { opacity: 0.88; }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid transparent;
    padding: 6px 12px;
    font-size: 12px;
  }

  .btn-danger:hover { border-color: var(--danger); }

  .btn-sm {
    padding: 6px 14px;
    font-size: 12px;
  }

  .btn-accent {
    background: var(--accent);
    color: #fff;
  }

  .btn-accent:hover:not(:disabled) { opacity: 0.88; }

  /* ── APP SHELL ── */
  #app { display: none; }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
  }

  .topbar-logo {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text);
  }

  .topbar-logo span { color: var(--accent); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    display: inline-block;
  }

  .status-dot.ok { background: var(--success); }

  .sidebar {
    position: fixed;
    top: 52px; left: 0; bottom: 0;
    width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    overflow-y: auto;
  }

  .nav-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 8px 20px 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    font-weight: 400;
    transition: color 0.15s, background 0.15s;
    border-left: 2px solid transparent;
    user-select: none;
  }

  .nav-item:hover { color: var(--text); background: var(--surface2); }

  .nav-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--accent-dim);
  }

  .nav-icon { font-size: 15px; width: 18px; text-align: center; }

  .main {
    margin-left: 200px;
    margin-top: 52px;
    padding: 32px;
    min-height: calc(100vh - 52px);
  }

  /* ── SECTION ── */
  .section { display: none; }
  .section.active { display: block; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .section-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  /* ── WORKS LIST ── */
  .works-list { display: flex; flex-direction: column; gap: 10px; }

  .work-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .work-thumb {
    width: 64px; height: 40px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--border);
    flex-shrink: 0;
  }

  .work-info { flex: 1; min-width: 0; }

  .work-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .work-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 10px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    line-height: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .badge.video { border-color: #4a7ee8; color: #4a7ee8; }
  .badge.photo { border-color: #9a4ae8; color: #9a4ae8; }
  .badge.draft { border-color: #e8a00a; color: #e8a00a; }

  .work-actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* ── WORKS SORT ── */
  .drag-handle {
    cursor: grab;
    color: var(--text-muted);
    font-size: 16px;
    padding: 0 4px;
    flex-shrink: 0;
    display: none;
    user-select: none;
    line-height: 1;
  }
  .drag-handle:active { cursor: grabbing; }
  .sort-mode .drag-handle { display: flex; align-items: center; }
  .sort-mode .work-actions { display: none; }
  .work-item.drag-over { border-color: var(--accent); background: var(--accent-dim); }
  .work-item.dragging { opacity: 0.4; }
  .sort-save-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 12px 18px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--accent);
  }
  .sort-save-bar.visible { display: flex; }

  /* ── NEWS LIST ── */
  .news-list { display: flex; flex-direction: column; gap: 10px; }

  .news-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .news-date {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .news-info { flex: 1; min-width: 0; }

  .news-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .news-body {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── FORM ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-grid .span2 { grid-column: span 2; }

  /* ── HERO ── */
  .hero-preview {
    width: 100%;
    aspect-ratio: 16/7;
    border-radius: 8px;
    object-fit: cover;
    background: var(--surface2);
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-dim); }
  .upload-zone-icon { font-size: 32px; margin-bottom: 12px; }
  .upload-zone-text { color: var(--text-dim); font-size: 13px; }
  .upload-zone-sub { color: var(--text-muted); font-size: 11px; margin-top: 4px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .modal-title { font-size: 16px; font-weight: 600; }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }

  .modal-close:hover { color: var(--text); }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 13px;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 320px;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--success); }
  #toast.error { border-color: var(--danger); }

  /* ── MISC ── */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state-text { font-size: 13px; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .media-item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }

  .media-item-row select, .media-item-row input { margin: 0; }

  .media-item-row .btn-danger { margin-left: auto; flex-shrink: 0; }

  #media-rows .media-row-type { width: 110px; flex-shrink: 0; }
  #media-rows .media-row-src { flex: 1; }

  /* ── 統一メディアマネージャ ── */
  .mm-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .mm-empty { font-size: 12px; color: var(--text-muted); padding: 8px 2px; }
  .mm-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
  @media (max-width: 560px) { .mm-settings { grid-template-columns: 1fr; } }
  .mm-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
  }
  .mm-thumb {
    width: 64px; height: 44px; object-fit: cover; border-radius: 4px;
    background: #111; flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 18px; color: var(--text-muted);
  }
  .mm-thumb-yt { background: rgba(232,130,10,0.15); color: var(--accent); }
  .mm-thumb-vid { background: rgba(255,255,255,0.06); }
  .mm-label { flex: 1; font-size: 12px; color: var(--text-light); word-break: break-all; line-height: 1.5; }
  .mm-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .mm-actions .btn { padding: 5px 9px; }
  .upload-zone.drag { border-color: var(--accent); background: rgba(232,130,10,0.06); }

  /* ── IMAGE UPLOAD ── */
  .img-upload-area {
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-top: 8px;
  }
  .img-upload-area:hover { border-color: var(--accent); background: var(--accent-dim); }
  .img-upload-area.has-image { border-style: solid; border-color: var(--accent); }
  .img-upload-preview {
    width: 100%; max-height: 120px;
    object-fit: cover;
    border-radius: 4px;
    margin-bottom: 8px;
    display: none;
  }
  .img-upload-label { font-size: 12px; color: var(--text-muted); }
  .img-upload-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .img-uploading {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  .img-preview-small {
    width: 48px; height: 32px;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }


  /* ── INQUIRIES ── */
  .inq-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
  .inq-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .inq-stat .num { font-size: 24px; font-weight: 700; margin-bottom: 2px; }
  .inq-stat .lbl { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
  .inq-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .inq-tab { padding: 9px 18px; font-size: 11px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); background: none; border: none; cursor: pointer; position: relative; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.2s; }
  .inq-tab:hover { color: var(--text); }
  .inq-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .inq-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; transition: border-color 0.15s; }
  .inq-card:hover { border-color: #3a3a3a; }
  .inq-card-header { display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px; cursor: pointer; }
  .inq-card-detail { display: none; padding: 0 18px 16px; border-top: 1px solid var(--border); padding-top: 14px; }

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">De<span>F</span>ilMe <span style="color:var(--text-muted);font-weight:300">CMS</span></div>
    <div class="login-sub">Content Management System</div>

    <div class="field-group">
      <label class="field-label">GitHub Personal Access Token</label>
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
    </div>
    <div class="field-group">
      <label class="field-label">GitHub ユーザー名</label>
      <input type="text" id="owner-input" value="bitcan2023-boop">
    </div>
    <div class="field-group">
      <label class="field-label">リポジトリ名</label>
      <input type="text" id="repo-input" value="defilme">
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">ログイン</button>
    <div id="login-error" style="color:var(--danger);font-size:12px;margin-top:12px;display:none;"></div>
  </div>
</div>
