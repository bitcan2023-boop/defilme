<!DOCTYPE html>
<html lang="ja" style="background-color:#1e1e1e;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work — DeFilMe</title>
  <meta name="color-scheme" content="dark">
  <script>document.documentElement.className += ' js-fade';</script>
  <style>
    /* htmlの黒背景は常に表示したまま、body(中身)だけフェードイン */
    html { background-color: #1e1e1e; }
    html.js-fade body { opacity: 0; }
    html.js-fade.page-ready body {
      opacity: 1;
      transition: opacity 0.4s cubic-bezier(0.4,0.4,0,1);
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.documentElement.classList.add('page-ready');
      // backdrop-filterはアニメ開始後(1s)に付与してレイヤー確保チラつきを防ぐ
      setTimeout(function() {
        var h = document.querySelector('header');
        if (h) h.classList.add('blur-ready');
      }, 1000);
    });
  </script>
  <link rel="stylesheet" href="style.css?v=20260613">
  <link rel="icon" type="image/svg+xml" href="f3-dark.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="f3-dark-180.png">
  <style>
    .detail-wrap {
      padding: 100px 80px 120px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* 戻るボタン */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 56px;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--white); }

    .back-btn svg { transition: transform 0.2s; }
    .back-btn:hover svg { transform: translateX(-4px); }

    /* ヘッダー */
    .detail-header {
      margin-bottom: 64px;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
    }

    .detail-cat {
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .detail-date {
      font-family: var(--font-display);
      font-size: 0.68rem;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .detail-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--white);
      margin-bottom: 12px;
    }

    .detail-client {
      font-family: var(--font-noto);
      font-size: 0.82rem;
      color: var(--text-mid);
      font-weight: 300;
      margin-bottom: 20px;
    }

    .detail-desc {
      font-family: var(--font-noto);
      font-size: 0.88rem;
      color: var(--text-mid);
      line-height: 2;
      font-weight: 300;
      max-width: 640px;
    }

    /* ── メディアグリッド ── */
    .detail-media {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 2px;
      margin-top: 8px;
    }

    /* デフォルト: 全部3列 */
    .detail-media .media-item { grid-column: span 2; }

    /* 1枚: フル幅 */
    .detail-media .media-item:only-child { grid-column: span 6; }

    /* 2枚: 均等3列ずつ */
    .detail-media.count-2 .media-item { grid-column: span 3; }

    /* 3枚: 均等2列ずつ */
    .detail-media.count-3 .media-item { grid-column: span 2; }

    /* 4枚: 3列 → 3+1配置 */
    .detail-media.count-4 .media-item { grid-column: span 2; }
    .detail-media.count-4 .media-item:nth-child(4) { grid-column: span 6; }

    /* 5枚: 3+2 */
    .detail-media.count-5 .media-item { grid-column: span 2; }
    .detail-media.count-5 .media-item:nth-child(4),
    .detail-media.count-5 .media-item:nth-child(5) { grid-column: span 3; }

    /* 6枚以上: 3列均等 */
    .detail-media.count-many .media-item { grid-column: span 2; }

    /* 動画・YouTube: 常にフル幅 */
    .detail-media .media-item.type-video,
    .detail-media .media-item.type-youtube {
      grid-column: span 6 !important;
      grid-row: span 1 !important;
    }

    .media-item {
      position: relative;
      overflow: hidden;
      background: #0d0d0d;
      aspect-ratio: 1/1;
    }

    /* 動画・YouTubeはaspect-ratio固定しない */
    .media-item.type-video,
    .media-item.type-youtube { aspect-ratio: unset; }

    .media-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, opacity 0.25s;
      cursor: zoom-in;
    }

    .media-item:hover img {
      transform: scale(1.06);
      opacity: 0.8;
    }

    .media-item video {
      width: 100%;
      height: auto;
      display: block;
      outline: none;
      background: #000;
      cursor: pointer;
    }

    .media-item .yt-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }

    .media-item .yt-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .media-caption { display: none; }

    @media (max-width: 768px) {
      .detail-media { grid-template-columns: repeat(3, 1fr); gap: 2px; }
      .detail-media .media-item,
      .detail-media.count-2 .media-item,
      .detail-media.count-3 .media-item,
      .detail-media.count-4 .media-item,
      .detail-media.count-5 .media-item,
      .detail-media.count-many .media-item { grid-column: span 1; }
      .detail-media .media-item.type-video,
      .detail-media .media-item.type-youtube { grid-column: span 3 !important; }
    }

    /* ── ライトボックス ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 2px;
      animation: lb-in 0.2s ease;
    }

    #lightbox-video {
      max-width: 92vw;
      max-height: 92vh;
      outline: none;
      background: #000;
      animation: lb-in 0.2s ease;
    }

    @keyframes lb-in {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    #lightbox-close {
      position: fixed;
      top: 20px; right: 24px;
      color: rgba(255,255,255,0.7);
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      z-index: 1001;
      transition: color 0.2s;
    }
    #lightbox-close:hover { color: #fff; }

    #lightbox-nav-prev,
    #lightbox-nav-next {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 40px;
      cursor: pointer;
      padding: 20px;
      transition: color 0.2s;
      z-index: 1001;
      user-select: none;
    }
    #lightbox-nav-prev { left: 8px; }
    #lightbox-nav-next { right: 8px; }
    #lightbox-nav-prev:hover,
    #lightbox-nav-next:hover { color: #fff; }

    #lightbox-counter {
      position: fixed;
      bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
    }

    /* ローディング */
    .detail-loading {
      padding: 120px 0;
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
    }

    /* Not found */
    .detail-notfound {
      padding: 120px 0;
      text-align: center;
    }

    .detail-notfound p {
      font-family: var(--font-noto);
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    @media (max-width: 768px) {
      .detail-wrap { padding: 90px 24px 80px; }
      .media-row { grid-template-columns: 1fr; }
    }
  </style>

  <script>
    document.getElementById('hamburger').addEventListener('click', () =>
      document.getElementById('mobileNav').classList.add('open'));
    document.getElementById('mobileNavClose').addEventListener('click', () =>
      document.getElementById('mobileNav').classList.remove('open'));

    // URLパラメータからIDを取得
    const params = new URLSearchParams(window.location.search);
    const workId = params.get('id');
    const wrap = document.getElementById('detailWrap');

    function subLabel(cat, sub) {
      const map = {
        'music-video': 'Music Video',
        'live-shoot': 'Live Shoot',
        'documentary': 'Documentary',
        'snap': 'Snap',
        'portrait': 'Portrait',
      };
      return map[sub] || sub;
    }

    // ── Lightbox ──
    let lbItems = [];
    let lbIndex = 0;

    function openLightbox(index) {
      lbIndex = index;
      showLightboxItem();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
      const vid = document.getElementById('lightbox-video');
      vid.pause();
      vid.src = '';
    }

    function showLightboxItem() {
      const item = lbItems[lbIndex];
      const img = document.getElementById('lightbox-img');
      const vid = document.getElementById('lightbox-video');
      img.style.display = 'none';
      vid.style.display = 'none';
      vid.pause();

      if (item.type === 'image') {
        img.src = item.src;
        img.style.display = 'block';
      } else if (item.type === 'video') {
        vid.src = item.src;
        vid.style.display = 'block';
      }

      const counter = document.getElementById('lightbox-counter');
      counter.textContent = `${lbIndex + 1} / ${lbItems.length}`;
      document.getElementById('lightbox-nav-prev').style.opacity = lbIndex > 0 ? '1' : '0.2';
      document.getElementById('lightbox-nav-next').style.opacity = lbIndex < lbItems.length - 1 ? '1' : '0.2';
    }

    function lbPrev() {
      if (lbIndex > 0) { lbIndex--; showLightboxItem(); }
    }

    function lbNext() {
      if (lbIndex < lbItems.length - 1) { lbIndex++; showLightboxItem(); }
    }

    document.addEventListener('keydown', e => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lbPrev();
      if (e.key === 'ArrowRight') lbNext();
    });

    // ── Media render ──
    function renderMedia(mediaList) {
      if (!mediaList || mediaList.length === 0) return { html: '', items: [] };

      const imgItems = mediaList.filter(m => m.type === 'image' || m.type === 'video');
      lbItems = imgItems;

      const count = mediaList.length;
      let countClass = '';
      if (count === 2) countClass = 'count-2';
      else if (count === 3) countClass = 'count-3';
      else if (count === 4) countClass = 'count-4';
      else if (count === 5) countClass = 'count-5';
      else if (count >= 6) countClass = 'count-many';

      let lbIdx = 0;
      let html = '';
      mediaList.forEach(item => {
        const currentIdx = (item.type === 'image' || item.type === 'video') ? lbIdx++ : -1;
        html += mediaItemHTML(item, currentIdx);
      });

      return { html, countClass };
    }

    function mediaItemHTML(item, lbIdx) {
      let inner = '';
      let typeClass = '';
      if (item.type === 'image') {
        inner = `<img src="${item.src}" alt="${item.caption || ''}" onclick="openLightbox(${lbIdx})" loading="lazy">`;
      } else if (item.type === 'video') {
        typeClass = 'type-video';
        inner = `<video controls playsinline preload="metadata" onclick="openLightbox(${lbIdx})"><source src="${item.src}"></video>`;
      } else if (item.type === 'youtube') {
        typeClass = 'type-youtube';
        inner = `<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${item.id}" allowfullscreen loading="lazy"></iframe></div>`;
      }
      const caption = item.caption ? `<p class="media-caption">${item.caption}</p>` : '';
      return `<div class="media-item ${typeClass}">${inner}${caption}</div>`;
    }

    if (!workId) {
      wrap.innerHTML = `<div class="detail-notfound"><p>作品が見つかりませんでした。</p><a href="works.html" class="back-btn">← Works一覧へ</a></div>`;
    } else {
      const work = WORKS_DATA.find(w => w.id === workId);
      if (!work) {
        wrap.innerHTML = `<div class="detail-notfound"><p>作品が見つかりませんでした。</p><a href="works.html" class="back-btn">← Works一覧へ</a></div>`;
      } else {
        // タイトルを更新
        document.title = `${work.title} — DeFilMe`;

        wrap.innerHTML = `
          <a href="works.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Works
          </a>

          <div class="detail-header">
            <div class="detail-meta">
              <span class="detail-cat">${subLabel(work.category, work.sub)}</span>
              ${work.date ? `<span class="detail-date">${work.date.replace('-','.')}</span>` : ''}
            </div>
            <h1 class="detail-title">${work.title}</h1>
            ${work.client ? `<p class="detail-client">Client: ${work.client}</p>` : ''}
            ${work.description ? `<p class="detail-desc">${work.description}</p>` : ''}
          </div>

          ${(() => {
            const { html, countClass } = renderMedia(work.media);
            return `<div class="detail-media ${countClass}">${html}</div>`;
          })()}
        `;
      }
    }

    // Reveal on scroll
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(el => {
        if (el.isIntersecting) {
          el.target.classList.add('visible');
          revealObserver.unobserve(el.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

    // Footer HIBIKI TAKAI: スクロールで入ったときにブラーreveal
    const footerNameEl = document.querySelector('.footer-name-reveal');
    if (footerNameEl) {
      const footerObserver = new IntersectionObserver((entries) => {
        entries.forEach(el => {
          if (el.isIntersecting) {
            el.target.classList.add('in-view');
            footerObserver.unobserve(el.target);
          }
        });
      }, { threshold: 0.2 });
      footerObserver.observe(footerNameEl);
    }
  </script>
</body>
</html>
