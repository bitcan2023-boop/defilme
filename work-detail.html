  <meta name="color-scheme" content="dark">
  <script>document.documentElement.className += ' js-fade';</script>
  <style>
    /* htmlの黒背景は常に表示したまま、body(中身)だけフェードイン */
    html { background-color: #1e1e1e; }
    html.js-fade body { opacity: 0; }
    html.js-fade.page-ready body {
      opacity: 1;
      transition: opacity 0.4s cubic-bezier(0.4,0.4,0,1);
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.documentElement.classList.add('page-ready');
      // backdrop-filterはアニメ開始後(1s)に付与してレイヤー確保チラつきを防ぐ
      setTimeout(function() {
        var h = document.querySelector('header');
        if (h) h.classList.add('blur-ready');
      }, 1000);
    });
  </script>

  <style>
    .detail-wrap {
      padding: 100px 80px 120px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* 戻るボタン */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 56px;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--white); }

    .back-btn svg { transition: transform 0.2s; }
    .back-btn:hover svg { transform: translateX(-4px); }

    /* ヘッダー */
    .detail-header {
      margin-bottom: 64px;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
    }

    .detail-cat {
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .detail-date {
      font-family: var(--font-display);
      font-size: 0.68rem;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .detail-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--white);
      margin-bottom: 12px;
    }

    .detail-client {
      font-family: var(--font-noto);
      font-size: 0.82rem;
      color: var(--text-mid);
      font-weight: 300;
      margin-bottom: 20px;
    }

    .detail-desc {
      font-family: var(--font-noto);
      font-size: 0.88rem;
      color: var(--text-mid);
      line-height: 2;
      font-weight: 300;
      max-width: 640px;
    }

    /* メディアグリッド */
    .detail-media {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .media-item {
      position: relative;
      overflow: hidden;
    }

    .media-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.6s ease;
    }

    .media-item:hover img {
      transform: scale(1.02);
    }

    /* 動画 */
    .media-item video {
      width: 100%;
      height: auto;
      display: block;
      outline: none;
      background: #000;
    }

    /* YouTube埋め込み */
    .media-item .yt-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }

    .media-item .yt-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* キャプション */
    .media-caption {
      font-family: var(--font-noto);
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--text-dim);
      padding: 10px 0 20px;
      letter-spacing: 0.06em;
    }

    /* 横並びレイアウト（画像2枚以上の場合） */
    .media-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    /* ローディング */
    .detail-loading {
      padding: 120px 0;
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
    }

    /* Not found */
    .detail-notfound {
      padding: 120px 0;
      text-align: center;
    }

    .detail-notfound p {
      font-family: var(--font-noto);
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    @media (max-width: 768px) {
      .detail-wrap { padding: 90px 24px 80px; }
      .media-row { grid-template-columns: 1fr; }
    }
  </style>

  <script>
    document.getElementById('hamburger').addEventListener('click', () =>
      document.getElementById('mobileNav').classList.add('open'));
    document.getElementById('mobileNavClose').addEventListener('click', () =>
      document.getElementById('mobileNav').classList.remove('open'));

    // URLパラメータからIDを取得
    const params = new URLSearchParams(window.location.search);
    const workId = params.get('id');
    const wrap = document.getElementById('detailWrap');

    function subLabel(cat, sub) {
      const map = {
        'music-video': 'Music Video',
        'live-shoot': 'Live Shoot',
        'documentary': 'Documentary',
        'snap': 'Snap',
        'portrait': 'Portrait',
      };
      return map[sub] || sub;
    }

    function renderMedia(mediaList) {
      if (!mediaList || mediaList.length === 0) return '';

      // 画像が連続する場合は2カラムグリッドに
      let html = '';
      let i = 0;
      while (i < mediaList.length) {
        const item = mediaList[i];
        const next = mediaList[i + 1];

        if (item.type === 'image' && next && next.type === 'image') {
          // 2枚横並び
          html += `<div class="media-row">`;
          html += mediaItemHTML(item);
          html += mediaItemHTML(next);
          html += `</div>`;
          i += 2;
        } else {
          html += mediaItemHTML(item);
          i++;
        }
      }
      return html;
    }

    function mediaItemHTML(item) {
      let inner = '';
      if (item.type === 'image') {
        inner = `<img src="${item.src}" alt="${item.caption || ''}">`;
      } else if (item.type === 'video') {
        inner = `<video controls playsinline preload="metadata"><source src="${item.src}"></video>`;
      } else if (item.type === 'youtube') {
        inner = `<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${item.id}" allowfullscreen loading="lazy"></iframe></div>`;
      }
      const caption = item.caption ? `<p class="media-caption">${item.caption}</p>` : '';
      return `<div class="media-item">${inner}${caption}</div>`;
    }

    if (!workId) {
      wrap.innerHTML = `<div class="detail-notfound"><p>作品が見つかりませんでした。</p><a href="works.html" class="back-btn">← Works一覧へ</a></div>`;
    } else {
      const work = WORKS_DATA.find(w => w.id === workId);
      if (!work) {
        wrap.innerHTML = `<div class="detail-notfound"><p>作品が見つかりませんでした。</p><a href="works.html" class="back-btn">← Works一覧へ</a></div>`;
      } else {
        // タイトルを更新
        document.title = `${work.title} — DeFilMe`;

        wrap.innerHTML = `
          <a href="works.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Works
          </a>

          <div class="detail-header">
            <div class="detail-meta">
              <span class="detail-cat">${subLabel(work.category, work.sub)}</span>
              ${work.date ? `<span class="detail-date">${work.date.replace('-','.')}</span>` : ''}
            </div>
            <h1 class="detail-title">${work.title}</h1>
            ${work.client ? `<p class="detail-client">Client: ${work.client}</p>` : ''}
            ${work.description ? `<p class="detail-desc">${work.description}</p>` : ''}
          </div>

          <div class="detail-media">
            ${renderMedia(work.media)}
          </div>
        `;
      }
    }

    // Reveal on scroll
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(el => {
        if (el.isIntersecting) {
          el.target.classList.add('visible');
          revealObserver.unobserve(el.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

    // Footer HIBIKI TAKAI: スクロールで入ったときにブラーreveal
    const footerNameEl = document.querySelector('.footer-name-reveal');
    if (footerNameEl) {
      const footerObserver = new IntersectionObserver((entries) => {
        entries.forEach(el => {
          if (el.isIntersecting) {
            el.target.classList.add('in-view');
            footerObserver.unobserve(el.target);
          }
        });
      }, { threshold: 0.2 });
      footerObserver.observe(footerNameEl);
    }
  </script>
